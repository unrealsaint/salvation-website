name: Notify Discord on Wiki Article Changes

on:
  push:
    branches:
      - master
      - main
    paths:
      - "js/wiki-articles-*.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Shallow is enough: push range comes from GitHub Compare API, not local git history.
          fetch-depth: 1

      - name: Collect changed article files
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python3 << 'PY'
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request

          def is_article(path: str) -> bool:
              return path.startswith("js/wiki-articles-") and path.endswith(".js")

          def write_output(added: list[str], modified: list[str]) -> None:
              out = os.environ["GITHUB_OUTPUT"]
              with open(out, "a", encoding="utf-8") as f:
                  f.write("added_files<<EOF\n")
                  f.write("\n".join(added) + ("\n" if added else ""))
                  f.write("EOF\n")
                  f.write("modified_files<<EOF\n")
                  f.write("\n".join(modified) + ("\n" if modified else ""))
                  f.write("EOF\n")

          def compare_via_api(before: str, after: str) -> tuple[list[str], list[str]]:
              repo = os.environ["REPO_FULL"]
              token = os.environ["GH_TOKEN"]
              url = f"https://api.github.com/repos/{repo}/compare/{before}...{after}"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"::warning::GitHub compare API failed ({e.code}): {body[:500]}")
                  return [], []

              added, modified = [], []
              for f in data.get("files") or []:
                  path = f.get("filename") or ""
                  if not is_article(path):
                      continue
                  st = (f.get("status") or "").lower()
                  if st == "added":
                      added.append(path)
                  elif st == "modified":
                      modified.append(path)
              return added, modified

          def parent_sha_via_api(sha: str) -> str | None:
              repo = os.environ["REPO_FULL"]
              token = os.environ["GH_TOKEN"]
              url = f"https://api.github.com/repos/{repo}/commits/{sha}"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"::warning::GitHub commits API failed ({e.code}): {body[:500]}")
                  return None
              parents = data.get("parents") or []
              if not parents:
                  return None
              return (parents[0].get("sha") or "").strip() or None

          def all_tracked_articles() -> list[str]:
              r = subprocess.run(
                  ["git", "ls-files", "js/wiki-articles-*.js"],
                  capture_output=True,
                  text=True,
                  cwd=".",
              )
              if r.returncode != 0:
                  return []
              return [p for p in r.stdout.splitlines() if p.strip()]

          event = os.environ.get("EVENT_NAME", "")
          before = (os.environ.get("BEFORE_SHA") or "").strip()
          after = (os.environ.get("AFTER_SHA") or "").strip()
          zero = "0" * 40

          added: list[str] = []
          modified: list[str] = []

          if event == "workflow_dispatch":
              parent = parent_sha_via_api(after)
              if parent:
                  added, modified = compare_via_api(parent, after)
              else:
                  added, modified = [], []
          elif not before or before == zero:
              added = all_tracked_articles()
              modified = []
          else:
              added, modified = compare_via_api(before, after)

          write_output(added, modified)
          PY

      - name: Send Discord embeds
        if: ${{ steps.files.outputs.added_files != '' || steps.files.outputs.modified_files != '' }}
        env:
          ADDED_FILES: ${{ steps.files.outputs.added_files }}
          MODIFIED_FILES: ${{ steps.files.outputs.modified_files }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SITE_URL: ${{ vars.SITE_URL }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          import urllib.error
          import urllib.parse
          from datetime import datetime, timezone

          EMBED_ICON_URL = "https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/39da6277-d7e8-4885-9cd8-12328bbe53a9/dgccekt-2af3f045-9119-4371-99e8-2c337a8484c8.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..An5_Zd3nCgx3QlDyD8aE9zezzMj5J0tSInTQcEIRRPc"

          token = os.getenv("DISCORD_BOT_TOKEN", "").strip()
          channel_id = os.getenv("DISCORD_CHANNEL_ID", "").strip()
          site_url = os.getenv("SITE_URL", "").strip().rstrip("/")
          added_files = [x.strip() for x in os.getenv("ADDED_FILES", "").splitlines() if x.strip()]
          modified_files = [x.strip() for x in os.getenv("MODIFIED_FILES", "").splitlines() if x.strip()]

          if not token or not channel_id:
              raise SystemExit("Missing DISCORD_BOT_TOKEN or DISCORD_CHANNEL_ID secret.")
          if not site_url:
              raise SystemExit("Missing SITE_URL repository variable.")

          if not added_files and not modified_files:
              print("No wiki article file changes detected.")
              raise SystemExit(0)

          def read_field(source: str, field_name: str) -> str:
              pattern = re.compile(
                  rf"{field_name}\s*:\s*\{{[\s\S]*?en\s*:\s*['\"`]([^'\"`]+)['\"`]",
                  re.MULTILINE,
              )
              match = pattern.search(source)
              return (match.group(1).strip() if match else "")

          def read_id(source: str) -> str:
              match = re.search(r"id\s*:\s*['\"`]([^'\"`]+)['\"`]", source, re.MULTILINE)
              return (match.group(1).strip() if match else "")

          def send_embed(file_path: str, event_type: str) -> None:
              if not os.path.exists(file_path):
                  print(f"Skipped missing file: {file_path}")
                  return

              with open(file_path, "r", encoding="utf-8") as f:
                  source = f.read()

              article_id = read_id(source)
              title = read_field(source, "title")
              excerpt = read_field(source, "excerpt")

              if not article_id or not title:
                  print(f"Skipped file with missing id/title: {file_path}")
                  return

              article_url = f"{site_url}/wiki.html#{urllib.parse.quote(article_id, safe='')}"
              is_added = event_type == "added"
              fallback_text = f"A wiki article was {'added' if is_added else 'updated'}."

              payload = {
                  "embeds": [
                      {
                          "author": {
                              "name": "Oasis Wiki Announcements",
                              "icon_url": EMBED_ICON_URL,
                          },
                          "title": f"{'📚 New Wiki Article' if is_added else '🛠️ Wiki Article Updated'}",
                          "description": (
                              f"**{title}**\n"
                              f"{excerpt or fallback_text}\n\n"
                              f"🔗 [Open article]({article_url})"
                          ),
                          "url": article_url,
                          "color": 5814783 if is_added else 16098851,
                          "thumbnail": {
                              "url": EMBED_ICON_URL,
                          },
                          "fields": [
                              {"name": "Type", "value": "New article" if is_added else "Article update", "inline": True},
                              {"name": "Entry ID", "value": f"`{article_id}`", "inline": True},
                              {"name": "Direct Link", "value": f"[Click to view]({article_url})", "inline": False},
                          ],
                          "footer": {
                              "text": "Oasis World Wiki",
                              "icon_url": EMBED_ICON_URL,
                          },
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                      }
                  ]
              }

              req = urllib.request.Request(
                  url=f"https://discord.com/api/v10/channels/{channel_id}/messages",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bot {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                      "User-Agent": "salvation-wiki-notifier/1.0 (+https://github.com/unrealsaint/salvation-website)",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(req) as response:
                      if response.status < 200 or response.status >= 300:
                          raise RuntimeError(f"Discord API returned status {response.status}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"Failed sending message for {file_path}: {e.code} {body}") from e

              print(f"Discord notification sent for {event_type} file {file_path}")

          for path in added_files:
              send_embed(path, "added")
          for path in modified_files:
              send_embed(path, "modified")
          PY
