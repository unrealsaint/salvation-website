name: Notify Discord on Wiki Article Changes

on:
  push:
    branches:
      - master
      - main
    paths:
      - "js/wiki-articles-*.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed article files
        id: files
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            ADDED_FILES=$(git ls-files 'js/wiki-articles-*.js')
            MODIFIED_FILES=""
          else
            ADDED_FILES=$(git diff --name-status "$BEFORE" "$AFTER" | awk '$1=="A" && $2 ~ /^js\/wiki-articles-.*\.js$/ {print $2}')
            MODIFIED_FILES=$(git diff --name-status "$BEFORE" "$AFTER" | awk '$1=="M" && $2 ~ /^js\/wiki-articles-.*\.js$/ {print $2}')
          fi

          {
            echo "added_files<<EOF"
            echo "$ADDED_FILES"
            echo "EOF"
            echo "modified_files<<EOF"
            echo "$MODIFIED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Discord embeds
        if: ${{ steps.files.outputs.added_files != '' || steps.files.outputs.modified_files != '' }}
        env:
          ADDED_FILES: ${{ steps.files.outputs.added_files }}
          MODIFIED_FILES: ${{ steps.files.outputs.modified_files }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SITE_URL: ${{ vars.SITE_URL }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          import urllib.error
          import urllib.parse
          from datetime import datetime, timezone

          EMBED_ICON_URL = "https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/39da6277-d7e8-4885-9cd8-12328bbe53a9/dgccekt-2af3f045-9119-4371-99e8-2c337a8484c8.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..An5_Zd3nCgx3QlDyD8aE9zezzMj5J0tSInTQcEIRRPc"

          token = os.getenv("DISCORD_BOT_TOKEN", "").strip()
          channel_id = os.getenv("DISCORD_CHANNEL_ID", "").strip()
          site_url = os.getenv("SITE_URL", "").strip().rstrip("/")
          added_files = [x.strip() for x in os.getenv("ADDED_FILES", "").splitlines() if x.strip()]
          modified_files = [x.strip() for x in os.getenv("MODIFIED_FILES", "").splitlines() if x.strip()]

          if not token or not channel_id:
              raise SystemExit("Missing DISCORD_BOT_TOKEN or DISCORD_CHANNEL_ID secret.")
          if not site_url:
              raise SystemExit("Missing SITE_URL repository variable.")

          if not added_files and not modified_files:
              print("No wiki article file changes detected.")
              raise SystemExit(0)

          def read_field(source: str, field_name: str) -> str:
              pattern = re.compile(
                  rf"{field_name}\s*:\s*\{{[\s\S]*?en\s*:\s*['\"`]([^'\"`]+)['\"`]",
                  re.MULTILINE,
              )
              match = pattern.search(source)
              return (match.group(1).strip() if match else "")

          def read_id(source: str) -> str:
              match = re.search(r"id\s*:\s*['\"`]([^'\"`]+)['\"`]", source, re.MULTILINE)
              return (match.group(1).strip() if match else "")

          def send_embed(file_path: str, event_type: str) -> None:
              if not os.path.exists(file_path):
                  print(f"Skipped missing file: {file_path}")
                  return

              with open(file_path, "r", encoding="utf-8") as f:
                  source = f.read()

              article_id = read_id(source)
              title = read_field(source, "title")
              excerpt = read_field(source, "excerpt")

              if not article_id or not title:
                  print(f"Skipped file with missing id/title: {file_path}")
                  return

              article_url = f"{site_url}/wiki.html#{urllib.parse.quote(article_id, safe='')}"
              is_added = event_type == "added"
              fallback_text = f"A wiki article was {'added' if is_added else 'updated'}."

              payload = {
                  "embeds": [
                      {
                          "author": {
                              "name": "Oasis Wiki Announcements",
                              "icon_url": EMBED_ICON_URL,
                          },
                          "title": f"{'📚 New Wiki Article' if is_added else '🛠️ Wiki Article Updated'}",
                          "description": (
                              f"**{title}**\n"
                              f"{excerpt or fallback_text}\n\n"
                              f"🔗 [Open article]({article_url})"
                          ),
                          "url": article_url,
                          "color": 5814783 if is_added else 16098851,
                          "thumbnail": {
                              "url": EMBED_ICON_URL,
                          },
                          "fields": [
                              {"name": "Type", "value": "New article" if is_added else "Article update", "inline": True},
                              {"name": "Entry ID", "value": f"`{article_id}`", "inline": True},
                              {"name": "Direct Link", "value": f"[Click to view]({article_url})", "inline": False},
                          ],
                          "footer": {
                              "text": "Oasis World Wiki",
                              "icon_url": EMBED_ICON_URL,
                          },
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                      }
                  ]
              }

              req = urllib.request.Request(
                  url=f"https://discord.com/api/v10/channels/{channel_id}/messages",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bot {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                      "User-Agent": "salvation-wiki-notifier/1.0 (+https://github.com/unrealsaint/salvation-website)",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(req) as response:
                      if response.status < 200 or response.status >= 300:
                          raise RuntimeError(f"Discord API returned status {response.status}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"Failed sending message for {file_path}: {e.code} {body}") from e

              print(f"Discord notification sent for {event_type} file {file_path}")

          for path in added_files:
              send_embed(path, "added")
          for path in modified_files:
              send_embed(path, "modified")
          PY
